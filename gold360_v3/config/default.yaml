# GOLD360 Default Configuration

project:
  name: GOLD360
  version: 0.3.0
  environment: development
  seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  feature_store_dir: data/feature_store
  synthetic_dir: data/synthetic
  temporal_granularity: monthly
  master_key: month_year
  date_format: "%Y-%m"

features:
  version: "v001"
  store_backend: parquet
  compute_parallel: false
  max_lag_months: 6
  rolling_windows: [3, 6]
  excluded_features:
    - delivery_efficiency
    - delivery_gap_ratio
    - delivery_efficiency_roll3
    - delivery_efficiency_roll3_std
    - energy_stress

weak_supervision:
  min_lf_coverage: 0.3
  fusion_method: majority_vote
  confidence_threshold: 0.5
  pseudo_label_threshold: 0.5
  store_audit_trail: true

anomaly:
  models:
    isolation_forest:
      n_estimators: 200
      contamination: 0.05
      random_state: 42
    ecod:
      contamination: 0.05
    lof:
      n_neighbors: 20
      contamination: 0.05
  ensemble_weights:
    isolation_forest: 0.40
    ecod: 0.30
    lof: 0.30
  consensus_threshold: 50.0

model:
  primary: catboost
  catboost:
    iterations: 1000
    learning_rate: 0.03
    depth: 6
    l2_leaf_reg: 3.0
    border_count: 128
    early_stopping_rounds: 50
    random_seed: 42
    verbose: false
    class_weight: [1.0, 2.0]
  calibration:
    enabled: true
    method: isotonic
    cv: 3
  risk_categories:
    low: [0.0, 0.25]
    moderate: [0.25, 0.50]
    elevated: [0.50, 0.75]
    high: [0.75, 1.0]

validation:
  temporal_split:
    train_start: "2020-01"
    train_end: "2023-12"
    val_start: "2024-01"
    val_end: "2024-06"
    test_start: "2024-07"
    test_end: "2025-12"
  n_folds: 5
  metrics:
    - roc_auc
    - precision
    - recall
    - f1
    - calibration_error

pipeline:
  cache_intermediate: true
  parallel_workers: 1
  log_level: INFO
  checkpoint_dir: models/checkpoints

logging:
  version: 1
  formatters:
    standard:
      format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: standard
    file:
      class: logging.handlers.RotatingFileHandler
      level: DEBUG
      formatter: standard
      filename: logs/gold360.log
      maxBytes: 10485760
      backupCount: 5
  root:
    level: INFO
    handlers: [console, file]
